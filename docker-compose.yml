version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=liqUID.com
      - DATABASE_URL=sqlite+aiosqlite:////app/data/liquid.db
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - WS_URL=ws://backend:8000/ws/live
    depends_on:
      - backend
